# ============================================================
# application.properties — Kogito Process Service Template
# ============================================================

# ─── Application ─────────────────────────────────────────────
quarkus.application.name=kogito-process-service
quarkus.http.port=8080

# ─── OIDC / Keycloak ─────────────────────────────────────────
quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:http://keycloak:8080/realms/kogito-realm}
quarkus.oidc.client-id=${QUARKUS_OIDC_CLIENT_ID:kogito-process-service}
quarkus.oidc.credentials.secret=${QUARKUS_OIDC_CREDENTIALS_SECRET:change-me}
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any

# Rôles applicatifs Kogito
kogito.security.auth.enabled=true
kogito.security.auth.roles-attribute=roles

# ─── DataSource PostgreSQL ─────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:kogito}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:kogito}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/kogito}

# Pool de connexions
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.acquisition-timeout=30

# Flyway / Liquibase (au choix)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true

# ─── Persistance Kogito ──────────────────────────────────────
kogito.persistence.type=jdbc
kogito.persistence.proto.marshaller=false

# ─── Kafka ──────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Sortant : domain events pour Data Index
mp.messaging.outgoing.kogito-processdomain.connector=smallrye-kafka
mp.messaging.outgoing.kogito-processdomain.topic=kogito-process-instances-domain
mp.messaging.outgoing.kogito-processdomain.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.kogito-usertaskdomain.connector=smallrye-kafka
mp.messaging.outgoing.kogito-usertaskdomain.topic=kogito-usertaskinstances-domain
mp.messaging.outgoing.kogito-usertaskdomain.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# ─── Jobs Service ──────────────────────────────────────────
kogito.jobs-service.url=${KOGITO_JOBS_SERVICE_URL:http://kogito-jobs-service}
kogito.service.url=${KOGITO_SERVICE_URL:http://kogito-process-service}

# ─── Data Index ──────────────────────────────────────────
kogito.data-index.url=${KOGITO_DATA_INDEX_URL:http://kogito-data-index}

# ─── OpenTelemetry ──────────────────────────────────────────
quarkus.otel.exporter.otlp.endpoint=${QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.resource.attributes=service.name=${quarkus.application.name}
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=1.0

# ─── Métriques Prometheus ────────────────────────────────────
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ─── Health ──────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# ─── Logging ─────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."org.kie".level=INFO
quarkus.log.category."org.drools".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.json=true

# ─── Dev mode ────────────────────────────────────────────────
%dev.quarkus.datasource.username=kogito
%dev.quarkus.datasource.password=kogito
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/kogito
%dev.kafka.bootstrap.servers=localhost:9092
%dev.kogito.security.auth.enabled=false
%dev.quarkus.log.console.json=false

# ─── Test ────────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.kogito.security.auth.enabled=false
%test.mp.messaging.outgoing.kogito-processdomain.connector=smallrye-in-memory
%test.mp.messaging.outgoing.kogito-usertaskdomain.connector=smallrye-in-memory
