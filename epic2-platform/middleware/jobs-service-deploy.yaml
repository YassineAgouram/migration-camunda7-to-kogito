---
# ============================================================
# Jobs Service — Kogito Platform
# Gère les timers BPMN et événements temporels
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kogito-jobs-service
  namespace: kogito-platform
  labels:
    app: kogito-jobs-service
    app.kubernetes.io/part-of: kogito-migration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kogito-jobs-service
  template:
    metadata:
      labels:
        app: kogito-jobs-service
        app.kubernetes.io/part-of: kogito-migration
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      serviceAccountName: kogito-service-account
      containers:
        - name: jobs-service
          image: quay.io/kiegroup/kogito-jobs-service-allinone:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            # Kafka
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kogito-kafka-kafka-bootstrap.kogito-platform.svc:9092"
            - name: MP_MESSAGING_OUTGOING_KOGITO_JOB_SERVICE_JOB_STATUS_EVENTS_TOPIC
              value: "kogito-jobs-service-job-status-events"
            # PostgreSQL
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: postgresql
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: kogito-postgres-secret
                  key: QUARKUS_DATASOURCE_JDBC_URL
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kogito-postgres-secret
                  key: QUARKUS_DATASOURCE_USERNAME
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kogito-postgres-secret
                  key: QUARKUS_DATASOURCE_PASSWORD
            # OpenTelemetry
            - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector.kogito-monitoring.svc:4317"
            # Jobs Service config
            - name: KOGITO_JOBS_SERVICE_SCHEDULER_CHUNK_SIZE
              value: "10"
            - name: KOGITO_JOBS_SERVICE_SCHEDULER_MAX_THREADS
              value: "4"
          resources:
            requests:
              memory: 256Mi
              cpu: "100m"
            limits:
              memory: 512Mi
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: kogito-jobs-service
  namespace: kogito-platform
  labels:
    app: kogito-jobs-service
spec:
  selector:
    app: kogito-jobs-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
