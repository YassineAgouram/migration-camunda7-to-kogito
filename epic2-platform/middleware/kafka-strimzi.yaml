---
# ============================================================
# Kafka via Strimzi Operator — Kogito Platform
# ============================================================

apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kogito-kafka
  namespace: kogito-platform
spec:
  kafka:
    version: 3.6.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
      - name: external
        port: 9094
        type: nodeport
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      log.retention.hours: 168
      log.retention.bytes: 10737418240
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 100Gi
          deleteClaim: false
          class: standard
    resources:
      requests:
        memory: 2Gi
        cpu: "500m"
      limits:
        memory: 4Gi
        cpu: "2"
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 10Gi
      deleteClaim: false
    resources:
      requests:
        memory: 512Mi
        cpu: "250m"
      limits:
        memory: 1Gi
        cpu: "500m"
  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: 256Mi
    userOperator:
      resources:
        requests:
          memory: 256Mi

---
# Topics Kogito standard
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kogito-process-instances-domain
  namespace: kogito-platform
  labels:
    strimzi.io/cluster: kogito-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000  # 7 jours
    cleanup.policy: delete

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kogito-usertaskinstances-domain
  namespace: kogito-platform
  labels:
    strimzi.io/cluster: kogito-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: kogito-jobs-service-job-status-events
  namespace: kogito-platform
  labels:
    strimzi.io/cluster: kogito-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 86400000  # 24h

---
# KafkaUser pour les services Kogito (SCRAM-SHA-512)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: kogito-process-user
  namespace: kogito-platform
  labels:
    strimzi.io/cluster: kogito-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: kogito-
          patternType: prefix
        operation: All
      - resource:
          type: group
          name: kogito-
          patternType: prefix
        operation: All
